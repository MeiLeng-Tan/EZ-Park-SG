info:
  name: Get the latest carpark availability in Singapore
  type: http
  seq: 1
  tags:
    - Transport

http:
  method: GET
  url: "{{baseUrl}}/transport/carpark-availability"
  headers:
    - name: x-api-key
      value: ""
      description: API key for higher rate limits (optional)
      disabled: true
  params:
    - name: date_time
      value: ""
      type: query
      description: YYYY-MM-DD[T]HH:mm:ss (SGT)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Carpark availability
    request:
      url: "{{baseUrl}}/transport/carpark-availability"
      method: GET
      headers:
        - name: x-api-key
          value: ""
          description: API key for higher rate limits (optional)
          disabled: true
      params:
        - name: date_time
          value: ""
          type: query
          description: YYYY-MM-DD[T]HH:mm:ss (SGT)
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "api_info": {
              "status": "healthy"
            },
            "items": [
              {
                "timestamp": "2025-08-07T09:01:00+08:00",
                "carpark_data": [
                  {
                    "total_lots": "500",
                    "lot_type": "C",
                    "lots_available": "123"
                  },
                  {
                    "total_lots": "100",
                    "lot_type": "H",
                    "lots_available": "12"
                  },
                  {
                    "total_lots": "50",
                    "lot_type": "S",
                    "lots_available": "5"
                  },
                  {
                    "total_lots": "50",
                    "lot_type": "Y",
                    "lots_available": "5"
                  }
                ]
              }
            ]
          }
  - name: default Response
    description: Error information
    request:
      url: "{{baseUrl}}/transport/carpark-availability"
      method: GET
      headers:
        - name: x-api-key
          value: ""
          description: API key for higher rate limits (optional)
          disabled: true
      params:
        - name: date_time
          value: ""
          type: query
          description: YYYY-MM-DD[T]HH:mm:ss (SGT)
          disabled: true
    response:
      statusText: Unknown
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 0,
            "message": ""
          }
